<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 급식 - 스마일밀</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#e0f2fe',
                            pink: '#fce7f3'
                        }
                    }
                }
            }
        }
    </script>
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-pink-50 min-h-screen text-slate-800 font-sans antialiased overflow-x-hidden selection:bg-pink-200 selection:text-pink-900 flex flex-col">
    <!-- Header -->
    <header class="glass-header sticky top-0 z-40 py-4 px-4 sm:px-8 flex justify-between items-center w-full">
        <h1 class="text-xl sm:text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-pink-500 cursor-pointer flex items-center gap-2" id="logo">
            <i class="ph-fill ph-bowl-food text-pink-500 text-2xl"></i>
            스마일밀
        </h1>
        <div class="flex gap-2 sm:gap-4 items-center">
            <button id="btnSearchSchool" class="flex items-center gap-2 hover:bg-slate-100/60 px-3 py-2 rounded-xl transition-all duration-300 group">
                <i class="ph ph-magnifying-glass text-lg text-slate-500 group-hover:text-blue-500 transition-colors"></i>
                <span id="currentSchoolName" class="font-medium text-slate-600 group-hover:text-slate-800 text-sm sm:text-base max-w-[120px] sm:max-w-[200px] truncate">학교 설정 필요</span>
            </button>
            <button id="btnAllergySetting" class="relative hover:bg-slate-100/60 p-2 rounded-xl transition-all duration-300 group">
                <i class="ph ph-warning-circle text-xl text-slate-500 group-hover:text-pink-500 transition-colors"></i>
                <!-- Red dot indicator for active allergies -->
                <span id="allergyActiveDot" class="hidden absolute top-1 right-1 w-2 h-2 bg-pink-500 rounded-full animate-pulse"></span>
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 pb-24 pt-6 w-full flex-1 flex flex-col">
        <!-- Date Selector -->
        <section class="flex justify-between items-center mb-8 glass-card rounded-3xl p-3 sm:p-5 shadow-sm">
            <button id="btnPrevDay" class="p-3 hover:bg-slate-100 rounded-2xl transition-colors text-slate-500 hover:text-blue-500 focus:ring-2 focus:ring-blue-100">
                <i class="ph-bold ph-caret-left text-2xl"></i>
            </button>
            
            <div class="flex flex-col items-center justify-center relative group" id="dateDisplayContainer">
                <div class="flex items-center gap-2 cursor-pointer">
                    <span id="displayDate" class="text-xl sm:text-3xl font-extrabold text-slate-800 tracking-tight group-hover:text-blue-600 transition-colors"></span>
                    <i class="ph ph-calendar-blank text-slate-400 group-hover:text-blue-500 transition-colors"></i>
                </div>
                <span id="btnGoToday" class="text-xs sm:text-sm text-slate-400 mt-1 cursor-pointer hover:text-blue-500 transition-colors font-medium">오늘로 돌아가기</span>
                
                <!-- Native Date Picker overlay, visually hidden but clickable -->
                <input type="date" id="datePicker" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full">
            </div>
            
            <button id="btnNextDay" class="p-3 hover:bg-slate-100 rounded-2xl transition-colors text-slate-500 hover:text-blue-500 focus:ring-2 focus:ring-blue-100">
                <i class="ph-bold ph-caret-right text-2xl"></i>
            </button>
        </section>

        <!-- Meals Container -->
        <section id="mealsContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6 sm:gap-8 flex-1">
            <!-- Loading Skeleton is injected via JS, or initial state -->
        </section>
    </main>

    <!-- Modals Overlay -->
    <div id="modalOverlay" class="fixed inset-0 bg-slate-900/30 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300">
        
        <!-- School Search Modal -->
        <div id="schoolModal" class="modal-content bg-white/95 backdrop-blur-xl rounded-3xl p-6 sm:p-8 w-full max-w-lg shadow-2xl transform scale-95 transition-transform duration-300 hidden flex-col h-[80vh] max-h-[600px] border border-white/50">
            <div class="flex justify-between items-center mb-6 shrink-0">
                <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                    <i class="ph-fill ph-magnifying-glass text-blue-500"></i> 학교 검색
                </h2>
                <button class="modal-close p-2 hover:bg-slate-100 rounded-full transition-colors"><i class="ph-bold ph-x text-xl text-slate-500"></i></button>
            </div>
            <form id="schoolSearchForm" class="relative mb-6 flex gap-2 shrink-0">
                <input type="text" id="schoolSearchInput" placeholder="학교 이름 (예: 서울고)" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all text-slate-700 font-medium placeholder-slate-400 text-lg">
                <button type="submit" class="bg-gradient-to-r from-blue-500 to-blue-600 hover:to-blue-700 text-white px-6 py-4 rounded-2xl transition-all shadow-lg shadow-blue-500/30 font-bold whitespace-nowrap active:scale-95">검색</button>
            </form>
            <div id="schoolSearchResults" class="overflow-y-auto flex-1 space-y-3 pr-2 custom-scrollbar">
                <!-- Search Results go here -->
                <div class="flex flex-col items-center justify-center h-full text-slate-400 space-y-4">
                    <i class="ph ph-buildings text-5xl opacity-50"></i>
                    <p>찾으시는 학교 이름을 검색해주세요.</p>
                </div>
            </div>
        </div>

        <!-- Allergy Modal -->
        <div id="allergyModal" class="modal-content bg-white/95 backdrop-blur-xl rounded-3xl p-6 sm:p-8 w-full max-w-xl shadow-2xl transform scale-95 transition-transform duration-300 hidden flex-col h-[80vh] max-h-[600px] border border-white/50">
            <div class="flex justify-between items-center mb-2 shrink-0">
                <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                    <i class="ph-fill ph-warning-circle text-pink-500"></i> 알레르기 설정
                </h2>
                <button class="modal-close p-2 hover:bg-slate-100 rounded-full transition-colors"><i class="ph-bold ph-x text-xl text-slate-500"></i></button>
            </div>
            <p class="text-sm sm:text-base text-slate-500 mb-6 shrink-0 bg-slate-50 p-4 rounded-xl border border-slate-100">
                선택하신 알레르기 유발 식품이 포함된 메뉴는 메뉴판에서 <span class="text-pink-500 font-bold">빨간색</span>으로 강조 표시됩니다.
            </p>
            <div id="allergyCheckboxes" class="grid grid-cols-2 sm:grid-cols-3 gap-3 sm:gap-4 overflow-y-auto pr-2 custom-scrollbar flex-1 mb-6 p-1">
                <!-- Allergy Checkboxes injected via JS -->
            </div>
            <div class="shrink-0 pt-2 border-t border-slate-100">
                <button id="btnSaveAllergy" class="w-full bg-gradient-to-r from-pink-500 to-rose-500 hover:to-rose-600 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-pink-500/30 text-lg active:scale-95">설정 저장 및 적용</button>
            </div>
        </div>

    </div>

    <!-- Template for Meal Card (Hidden) -->
    <template id="mealCardTemplate">
        <div class="glass-card rounded-3xl p-6 flex flex-col h-full hover-scale">
            <div class="flex items-center justify-between mb-6 pb-4 border-b border-slate-200/50">
                <h3 class="text-xl font-black meal-type-title text-slate-700 flex items-center gap-2">
                    <!-- Icon injected -->
                    <span class="meal-type-text">조식</span>
                </h3>
                <span class="meal-kcal text-sm font-bold text-slate-500 bg-slate-100/80 px-3 py-1 rounded-full backdrop-blur-sm"></span>
            </div>
            <div class="meal-dishes flex-1 space-y-3 mb-6">
                <!-- Dishes injected -->
            </div>
            <div class="mt-auto pt-4 border-t border-slate-200/50">
                <p class="meal-nutrients text-xs text-slate-400 leading-relaxed text-justify break-keep">
                    <!-- Nutrition injected -->
                </p>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
